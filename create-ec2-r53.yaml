- name: Create EC2_instances and R53
  hosts: local
  connection: local
  vars_files:
    - ec2_instance.yaml
  tasks:
    - name: Creating EC2_instances
      amazon.aws.ec2_instance:
        name: "{{item}}"
        vpc_subnet_id: "{{vpc_subnet}}"
        instance_type: "{{instance_type}}"
        security_group: "{{security_group}}"
        image_id: "{{image_id}}"
      loop: "{{instances_names}}"
      register: ec2details

    - name: EC2_instance details
      ansible.builtin.debug:
        msg: "{{ec2details}}"